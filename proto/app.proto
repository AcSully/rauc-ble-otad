syntax = "proto3";

package ble.app;

message Ping {
    uint64 nonce = 1;
}

message Pong {
    uint64 nonce = 1;
}

/* ---- Firmware version ---- */

// Phone -> board: request current firmware version.
message GetVersion {}

// Board -> phone: current firmware version (e.g. "0.0.1").
message VersionReply {
    string version = 1;
}

/* ---- OTA transfer protocol ---- */

// Phone -> board: start a new file transfer (caibx or chunk files).
message OtaBegin {
    string filename = 1;     // relative to /tmp; may contain one subdir (e.g. "rootfs.castr/ab/abcdef.cacnk")
    uint64 total_size = 2;
    uint32 chunk_size = 3;
}

message OtaBeginAck {
    bool   ok = 1;
    string error = 2;
}

message OtaChunk {
    uint32 seq = 1;
    bytes  data = 2;
}

message OtaChunkAck {
    uint32 seq = 1;
    bool   ok = 2;
}

message OtaEnd {
    uint64 crc64 = 1;        // unused; integrity is checked against OtaInstall.sha256
}

message OtaEndAck {
    bool   ok = 1;
    string error = 2;
}

/* ---- Casync differential flow ---- */

// Board -> phone (spontaneous after OtaEnd for rootfs.caibx):
// raw stdout of `casync list-chunks` (newline-separated "<ab>/<hash>.cacnk" paths).
message MissingChunks {
    bool   ok      = 1;
    string error   = 2;
    bytes  content = 3;
}

// Phone -> board: all cacnk files uploaded; extract and install.
message OtaInstall {
    bytes sha256 = 1;        // expected SHA-256 of the rebuilt .raucb (32 bytes)
}

message OtaInstallReply {
    bool   ok    = 1;
    string error = 2;
}
